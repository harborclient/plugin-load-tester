<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 1280px;
      height: 720px;
      min-height: 720px;
      max-height: 720px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family:
        -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #030910;
      background-image:
        radial-gradient(ellipse 48% 58% at 78% 23%, rgba(45, 212, 191, 0.22), transparent 66%),
        radial-gradient(ellipse 46% 54% at 20% 72%, rgba(34, 211, 238, 0.18), transparent 62%),
        radial-gradient(circle at 50% 55%, rgba(20, 184, 166, 0.12), transparent 42%),
        linear-gradient(145deg, #02070d 0%, #07111a 42%, #030910 100%);
      background-repeat: no-repeat;
      background-size: 1280px 720px;
    }

    .canvas {
      position: fixed;
      inset: 0;
      width: 1280px;
      height: 720px;
      background: transparent;
    }

    .canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at center, black 0%, transparent 72%);
      opacity: 0.38;
    }

    .canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 45%, transparent 0%, transparent 46%, rgba(0, 0, 0, 0.58) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.38));
    }

    .hero {
      position: absolute;
      z-index: 2;
      top: 138px;
      left: 94px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      color: #99f6e4;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: '';
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: #2dd4bf;
      box-shadow:
        0 0 18px rgba(45, 212, 191, 0.9),
        0 0 44px rgba(45, 212, 191, 0.45);
    }

    .plugin-name {
      position: relative;
      color: #f8ffff;
      font-size: 166px;
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: -0.08em;
      text-shadow:
        0 0 18px rgba(153, 246, 228, 0.34),
        0 0 82px rgba(45, 212, 191, 0.28),
        0 34px 80px rgba(0, 0, 0, 0.5);
      white-space: nowrap;
    }

    .plugin-name::after {
      content: 'Load Tester';
      position: absolute;
      inset: 0;
      z-index: -1;
      color: transparent;
      -webkit-text-stroke: 2px rgba(45, 212, 191, 0.22);
      filter: blur(10px);
      transform: translate(12px, 16px);
    }

    .tagline {
      margin-top: 38px;
      color: rgba(226, 255, 251, 0.76);
      font-size: 33px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .tile {
      position: absolute;
      z-index: 1;
      right: 132px;
      top: 164px;
      width: 244px;
      height: 244px;
      border-radius: 58px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01)),
        linear-gradient(145deg, rgba(20, 184, 166, 0.28), rgba(8, 13, 22, 0.72));
      border: 1px solid rgba(153, 246, 228, 0.22);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 30px 90px rgba(0, 0, 0, 0.48),
        0 0 90px rgba(45, 212, 191, 0.28);
    }

    .tile::before {
      content: '';
      position: absolute;
      left: 46px;
      right: 46px;
      bottom: 64px;
      height: 96px;
      background:
        linear-gradient(180deg, transparent 0 74px, rgba(94, 234, 212, 0.68) 74px 78px, transparent 78px),
        linear-gradient(90deg, transparent 0 6px, rgba(94, 234, 212, 0.38) 6px 10px, transparent 10px);
      background-size:
        100% 100%,
        28px 100%;
      border-left: 4px solid rgba(94, 234, 212, 0.72);
      border-bottom: 4px solid rgba(94, 234, 212, 0.72);
      filter: drop-shadow(0 0 20px rgba(45, 212, 191, 0.42));
    }

    .tile::after {
      content: '';
      position: absolute;
      left: 54px;
      right: 48px;
      bottom: 76px;
      height: 76px;
      background: linear-gradient(135deg, transparent 0 8%, #5eead4 8% 11%, transparent 11% 24%, #5eead4 24% 28%, transparent 28% 42%, #5eead4 42% 46%, transparent 46%);
      clip-path: polygon(0 80%, 18% 62%, 34% 70%, 50% 34%, 68% 46%, 84% 14%, 100% 26%, 100% 34%, 84% 22%, 69% 54%, 51% 42%, 36% 78%, 18% 70%, 0 88%);
      box-shadow: 0 0 34px rgba(45, 212, 191, 0.42);
    }

    .beam {
      position: absolute;
      z-index: 1;
      right: 362px;
      top: 324px;
      width: 172px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(94, 234, 212, 0.9), transparent);
      box-shadow: 0 0 24px rgba(45, 212, 191, 0.55);
      transform: rotate(-18deg);
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      background: #67e8f9;
      box-shadow:
        0 0 16px rgba(103, 232, 249, 0.78),
        0 0 44px rgba(20, 184, 166, 0.34);
    }

    .orb.one {
      top: 116px;
      left: 875px;
      width: 8px;
      height: 8px;
    }

    .orb.two {
      top: 504px;
      left: 1038px;
      width: 11px;
      height: 11px;
      opacity: 0.82;
    }

    .orb.three {
      top: 578px;
      left: 262px;
      width: 7px;
      height: 7px;
      opacity: 0.7;
    }

    .corner-glow {
      position: absolute;
      z-index: 1;
      right: -120px;
      bottom: -180px;
      width: 520px;
      height: 520px;
      border-radius: 999px;
      background: rgba(20, 184, 166, 0.18);
      filter: blur(68px);
    }
  </style>
</head>

<body>
  <div class="canvas">
    <div class="corner-glow"></div>
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>
    <div class="beam"></div>
    <div class="tile"></div>

    <div class="hero">
      <div class="eyebrow">HarborClient Plugin</div>
      <h1 class="plugin-name">Load Tester</h1>
      <p class="tagline">Chart latency, throughput, and error rate.</p>
    </div>
  </div>
</body>

</html>
